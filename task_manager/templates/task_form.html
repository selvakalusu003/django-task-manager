{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow">
<div class="card-body">

<h3 class="mb-4">
    {% if form.instance.pk %}
        Edit Task
    {% else %}
        Create Task
    {% endif %}
</h3>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <button class="btn btn-primary">Save Task</button>

    <a href="/" class="btn btn-secondary">Back</a>

</form>

</div>
</div>

</div>
</div>

{% endblock %}
